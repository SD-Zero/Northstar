<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Art App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- TOP BAR -->
    <header class="topbar">
        <div class="left">
            <button>Undo</button>
            <button>Redo</button>
            <button>Save</button>
        </div>

        <div class="right">
            <button>100%</button>
            <button>Brush 12px</button>
        </div>
    </header>

    <!-- MAIN -->
    <main>

        <!-- TOOLS -->
        <aside class="toolbar">

            <button>🖌️</button>
            <button>🩹</button>
            <button>🪣</button>
            <button>✂️</button>
            <button>↔️</button>
            <button>🎨</button>

        </aside>

        <!-- CANVAS -->
        <section class="canvas-area">

            <div class="paper">

                <span>Canvas Preview</span>

            </div>

        </section>

        <!-- LAYERS -->
        <aside class="layers expanded" id="layers">

            <div class="layers-header">

                <h2>Layers</h2>

                <button id="collapseBtn">❯</button>

            </div>

            <div class="layer selected">
                👁 Sketch
            </div>

            <div class="layer">
                👁 Line Art
            </div>

            <div class="layer">
                👁 Flats
            </div>

            <div class="layer">
                👁 Shadows
            </div>

            <div class="layer">
                👁 Highlights
            </div>

            <button class="new-layer">
                + New Layer
            </button>

        </aside>

    </main>

    <!-- BOTTOM BAR -->

    <footer class="dock">

        <button>Brush 1</button>
        <button>Brush 2</button>
        <button>Brush 3</button>
        <button>Brush 4</button>
        <button>Palette</button>

    </footer>

</div>

<script src="script.js"></script>

</body>
</html>
